<!DOCTYPE html>
<html>
<head>
    <title>Healthcare System</title>
</head>
<body>
    <h1>Heart Disease Patient Record System</h1>
    <p>Welcome to the secure healthcare record system.</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <p>{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <p><a href="/register">Register</a></p>
    <p><a href="/login">Login</a></p>
</body>
</html>
